<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eternal Circle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* Screen States - Optimized for Mobile GPU */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease-in-out, transform 2.2s cubic-bezier(0.25, 1, 0.5, 1);
            /* Forces Hardware Acceleration on Mobile */
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- SCREEN 1: START/END SCREEN --- */
        #start-screen {
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
            flex-direction: column;
            gap: 20px;
        }

        #bg-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            transition: transform 2.5s ease-in-out;
            will-change: transform;
            transform: translate3d(0,0,0);
        }

        .website-title {
            font-family: 'Georgia', serif;
            font-size: 2.5rem; /* Scaled down for mobile screens */
            font-weight: 300;
            font-style: italic;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3), 0 4px 10px rgba(0, 0, 0, 0.9);
            text-align: center;
            padding: 0 15px;
            animation: fadeInElement 1.5s ease-in-out;
            user-select: none;
        }

        .enter-btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px); /* Safari Mobile Support */
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 11;
            animation: fadeInElement 1.8s ease-in-out;
        }

        .enter-btn:hover, .enter-btn:active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 25px rgba(255,255,255,0.5);
        }

        .project-credits {
            position: absolute;
            bottom: 25px;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.75rem; /* Optimized for mobile viewing */
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 11;
            padding: 0 10px;
            width: 100%;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
            animation: fadeInElement 2s ease-in-out;
        }

        .project-credits span {
            color: #ffffff;
            font-weight: 600;
        }

        .tools-list {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-transform: none;
        }

        @keyframes fadeInElement {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- SCREEN 2: VIDEO SCREEN --- */
        #story-screen {
            background: #000;
            z-index: 5;
        }

        #life-video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .subtitle-container {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            width: 85%;
            text-align: center;
            pointer-events: none;
        }

        .subtitle-text {
            font-family: 'Georgia', serif;
            font-size: 1.4rem; /* Scaled down so long sentences fit on mobile screens */
            font-style: italic;
            font-weight: 400;
            color: #ffffff;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 1), 0px 1px 4px rgba(0, 0, 0, 0.8);
            line-height: 1.4;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .subtitle-text.visible {
            opacity: 1;
        }

        /* --- SCREEN 3: GOOGLE SCREEN --- */
        #google-screen {
            background: #ffffff;
            color: #000;
            flex-direction: column;
            z-index: 8;
        }

        .google-container {
            width: 100%;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .google-logo {
            font-size: 3.5rem;
            font-weight: bold;
            font-family: 'Product Sans', Arial, sans-serif;
            margin-bottom: 20px;
            user-select: none;
        }
        .g-g1 { color: #4285F4; }
        .g-o1 { color: #EA4335; }
        .g-o2 { color: #FBBC05; }
        .g-g2 { color: #4285F4; }
        .g-l  { color: #34A853; }
        .g-e  { color: #EA4335; }

        .search-box-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-radius: 24px;
            padding: 8px 15px;
            background: #fff;
            margin-bottom: 15px;
        }

        .search-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1rem;
            color: #000;
            background: transparent;
        }

        .search-buttons {
            display: flex;
            gap: 10px;
        }

        .google-btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 13px;
            padding: 0 12px;
            height: 32px;
            cursor: pointer;
        }

        /* --- MOBILE SMOOTH ZOOM TRANSITIONS --- */
        .zoom-out-transition {
            transform: scale(0.05) translateZ(0);
            opacity: 0 !important;
        }

        .zoom-in-target {
            transform: scale(2.5) translateZ(0);
        }
    </style>
</head>
<body>

    <!-- SCREEN 1 -->
    <div id="start-screen" class="screen active">
        <img id="bg-image" src="Gemini_Generated_Image_t27tqdt27tqdt27t.png" alt="Earth from Space">
        <h1 class="website-title">The Eternal Circle</h1>
        <button class="enter-btn" onclick="startJourney()">Enter</button>
        
        <div class="project-credits">
            Created by <span>Tharunya.S</span><br>
            Saranathan College of Engineering<br>
            <div class="tools-list">
                Powered by <strong>Gemini</strong> | Tools: Gemini, Google Flow, Nano Banana, Lyria 3
            </div>
        </div>
    </div>

    <!-- SCREEN 2: Mobile Inline Video Player Fixes -->
    <div id="story-screen" class="screen">
        <video id="life-video" preload="auto" playsinline webkit-playsinline>.
            <source src="Woman's_life_cycle_stages_202606192045_2.mp4" type="video/mp4">
        </video>
        <div class="subtitle-container">
            <div id="subtitle" class="subtitle-text"></div>
        </div>
    </div>

    <!-- SCREEN 3 -->
    <div id="google-screen" class="screen">
        <div class="google-container">
            <div class="google-logo">
                <span class="g-g1">G</span><span class="g-o1">o</span><span class="g-o2">o</span><span class="g-g2">g</span><span class="g-l">l</span><span class="g-e">e</span>
            </div>
            <div class="search-box-wrapper">
                <input type="text" class="search-input" id="google-search-input" readonly>
            </div>
            <div class="search-buttons">
                <button class="google-btn" id="search-btn">Google Search</button>
                <button class="google-btn">I'm Feeling Lucky</button>
            </div>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const storyScreen = document.getElementById('story-screen');
        const googleScreen = document.getElementById('google-screen');
        const bgImage = document.getElementById('bg-image');
        const lifeVideo = document.getElementById('life-video');
        const subtitle = document.getElementById('subtitle');
        const searchInput = document.getElementById('google-search-input');
        const searchBtn = document.getElementById('search-btn');

        const subtitleTimeline = [
            { time: 0.0, text: "A fragile cry breaks the silence... a girl is born into the world." },
            { time: 2.0, text: "Scraped knees, wide eyes, and boundless childhood dreams." },
            { time: 5.0, text: "Navigating the storms of youth, seeking love, identity, and purpose." },
            { time: 7.0, text: "An old woman sits quietly, wondering about the final mystery..." }
        ];

        function startJourney() {
            bgImage.style.transform = "scale(1.4) translate3d(0,0,0)";
            
            setTimeout(() => {
                startScreen.classList.remove('active');
                storyScreen.classList.add('active');
                
                lifeVideo.currentTime = 0;
                lifeVideo.muted = false;
                lifeVideo.play().catch(err => console.log("Mobile gesture handler bypass initialized."));
            }, 1500);
        }

        lifeVideo.addEventListener('timeupdate', () => {
            const currentTime = lifeVideo.currentTime;
            let activeSubtitle = "";
            for (let i = 0; i < subtitleTimeline.length; i++) {
                if (currentTime >= subtitleTimeline[i].time) {
                    activeSubtitle = subtitleTimeline[i].text;
                }
            }

            if (activeSubtitle !== "" && subtitle.innerHTML !== activeSubtitle) {
                subtitle.classList.remove('visible');
                setTimeout(() => {
                    subtitle.innerHTML = activeSubtitle;
                    subtitle.classList.add('visible');
                }, 100);
            }
        });

        lifeVideo.addEventListener('ended', () => {
            subtitle.classList.remove('visible');
            setTimeout(() => {
                storyScreen.classList.remove('active');
                googleScreen.classList.add('active');
                
                lifeVideo.muted = true;
                lifeVideo.pause();

                setTimeout(triggerGoogleTyping, 800);
            }, 500);
        });

        function triggerGoogleTyping() {
            const query = "life after death";
            let i = 0;
            
            function typeQuery() {
                if (i < query.length) {
                    searchInput.value += query.charAt(i);
                    i++;
                    setTimeout(typeQuery, 90);
                } else {
                    searchBtn.style.border = "1px solid #4285F4";
                    searchBtn.style.background = "#f1f3f4";
                    setTimeout(() => { searchBtn.click(); }, 1200);
                }
            }
            typeQuery();
        }

        searchBtn.addEventListener('click', () => {
            googleScreen.classList.add('zoom-out-transition');

            startScreen.style.transition = "none";
            startScreen.classList.add('zoom-in-target');
            startScreen.classList.add('active');
            
            void startScreen.offsetWidth; 
            
            setTimeout(() => {
                startScreen.style.transition = "opacity 2s ease-in-out, transform 2.8s cubic-bezier(0.1, 0.8, 0.2, 1)";
                startScreen.classList.remove('zoom-in-target');
                bgImage.style.transform = "scale(1) translate3d(0,0,0)"; 
            }, 50);

            setTimeout(() => {
                googleScreen.classList.remove('zoom-out-transition');
                googleScreen.classList.remove('active');
                searchInput.value = "";
                searchBtn.removeAttribute('style');
            }, 3200);
        });
    </script>
</body>
</html>
